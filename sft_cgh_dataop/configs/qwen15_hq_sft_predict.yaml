### model
model_name_or_path: ./sft_cgh_dataop/outputs/train/qwen15_hq_full_sft
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
# Signature-injected MBPP (under sft_cgh_dataop/data). Predict uses eval_dataset.
dataset_dir: ./sft_cgh_dataop/data
eval_dataset: mbpp_sanitized_test_with_signature
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: ./sft_cgh_dataop/outputs/predict
overwrite_output_dir: true
report_to: none

### generation
per_device_eval_batch_size: 8
predict_with_generate: true
max_new_tokens: 768
do_sample: false
num_beams: 1
fp16: true
ddp_timeout: 180000000
