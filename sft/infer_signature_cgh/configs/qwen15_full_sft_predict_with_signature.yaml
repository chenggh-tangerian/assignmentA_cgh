# 功能: 推理侧签名实验预测配置（Full SFT 权重，不重训）
# 输入: sft/outputs/qwen15_code_full_sft + 签名 MBPP
# 输出: infer_signature_cgh/outputs/ 下预测目录
### model
# Inference-only signature prompt: Full SFT weights unchanged.
model_name_or_path: ./sft/outputs/qwen15_code_full_sft
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
# Signature injected into MBPP eval prompts only (not train data).
dataset_dir: ./sft/infer_signature_cgh/data
eval_dataset: mbpp_sanitized_test_with_signature
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: ./sft/infer_signature_cgh/outputs/predict
overwrite_output_dir: true
report_to: none

### generation
per_device_eval_batch_size: 8
predict_with_generate: true
max_new_tokens: 768
do_sample: false
num_beams: 1
fp16: true
ddp_timeout: 180000000
