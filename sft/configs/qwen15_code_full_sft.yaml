# =============================================================================
# 功能: Qwen1.5-0.5B-Chat 代码 Full SFT 训练配置 (LLaMA-Factory)。
#
# 输入:
#   模型: ./Qwen1.5-0.5B-Chat
#   数据: ./sft/data 下 code_sft_train / code_sft_valid
#
# 输出:
#   ./sft/outputs/qwen15_code_full_sft  (checkpoint / trainer_state / loss 图等)
#
# 要点: finetuning_type=full, 3 epoch, lr=1e-5, fp16
# =============================================================================

### model
model_name_or_path: ./Qwen1.5-0.5B-Chat
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
compute_accuracy: true

### dataset
dataset_dir: ./sft/data
dataset: code_sft_train
eval_dataset: code_sft_valid
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 8

### output
output_dir: ./sft/outputs/qwen15_code_full_sft
logging_steps: 5
save_steps: 200
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
gradient_checkpointing: true
fp16: true
bf16: false
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval during training
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 200
