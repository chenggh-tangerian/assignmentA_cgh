# =============================================================================
# 功能: 基座模型（未 SFT）在 MBPP sanitized test 上批量预测，作对照。
#
# 输入:
#   模型: ./Qwen1.5-0.5B-Chat
#   数据: ./sft/data 中 mbpp_sanitized_test
#
# 输出:
#   ./sft/outputs/qwen15_code_base_predict/
#
# 要点: max_new_tokens=0 配合 max_length=2048（按总长截断生成）
# =============================================================================

### model
model_name_or_path: ./Qwen1.5-0.5B-Chat
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: full

### dataset
dataset_dir: ./sft/data
eval_dataset: mbpp_sanitized_test
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: ./sft/outputs/qwen15_code_base_predict
overwrite_output_dir: true
report_to: none

### generation
per_device_eval_batch_size: 2
predict_with_generate: true
max_length: 2048
max_new_tokens: 0
do_sample: false
num_beams: 1
fp16: true
ddp_timeout: 180000000
