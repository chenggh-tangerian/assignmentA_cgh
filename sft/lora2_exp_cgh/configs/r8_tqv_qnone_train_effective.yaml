# 功能: LoRA2 实验 训练配置 （effective：脚本展开后的生效副本）
# run: r8_tqv_qnone_train
# 要点: rank=8; LoRA target=q_proj,v_proj; 无量化
# 输入: 模型/数据见配置正文 model_name_or_path、dataset_dir
# 输出: 配置正文 output_dir
model_name_or_path: ./Qwen1.5-0.5B-Chat
trust_remote_code: true
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: q_proj,v_proj
compute_accuracy: true
dataset_dir: ./sft/lora2_exp_cgh/data
dataset: code_sft_train
eval_dataset: code_sft_valid
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 8
output_dir: ./sft/lora2_exp_cgh/outputs/r8_tqv_qnone/model
logging_steps: 5
save_steps: 1000
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 0.0001
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
gradient_checkpointing: true
fp16: true
bf16: false
ddp_timeout: 180000000
resume_from_checkpoint: null
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 1000
