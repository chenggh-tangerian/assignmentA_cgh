# 功能: LoRA2 实验 预测配置 （网格模板配置）
# run: r8_tall_q4_predict
# 要点: rank=8; LoRA target=全部线性层; 4bit 量化
# 输入: 模型/数据见配置正文 model_name_or_path、dataset_dir
# 输出: 配置正文 output_dir
model_name_or_path: ./Qwen1.5-0.5B-Chat
adapter_name_or_path: ./sft/lora2_exp_cgh/outputs/r8_tall_q4/model
trust_remote_code: true
stage: sft
do_predict: true
finetuning_type: lora
dataset_dir: ./sft/lora2_exp_cgh/data
eval_dataset: mbpp_sanitized_test
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2
output_dir: ./sft/lora2_exp_cgh/outputs/r8_tall_q4/predict
overwrite_output_dir: true
report_to: none
per_device_eval_batch_size: 2
predict_with_generate: true
max_new_tokens: 768
do_sample: false
num_beams: 1
fp16: true
ddp_timeout: 180000000
quantization_bit: 4
quantization_method: bnb
