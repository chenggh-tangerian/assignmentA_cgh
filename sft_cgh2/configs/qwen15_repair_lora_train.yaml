# 代码修复 SFT 训练配置（QLoRA）
#
# 输入:
#   基座模型: ./Qwen1.5-0.5B-Chat
#   数据集:   sft_cgh2/data 下的 repair_sft_train / repair_sft_valid
#             （由 scripts/build_repair_sft.py 生成）
#
# 输出:
#   LoRA adapter 与训练日志: ./sft_cgh2/outputs/qwen15_repair_lora
#
# 用法:
#   python -m llamafactory.cli train sft_cgh2/configs/qwen15_repair_lora_train.yaml

### model
model_name_or_path: ./Qwen1.5-0.5B-Chat
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: q_proj,v_proj
compute_accuracy: true

### dataset
dataset_dir: ./sft_cgh2/data
dataset: repair_sft_train
eval_dataset: repair_sft_valid
template: qwen
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 8

### output
output_dir: ./sft_cgh2/outputs/qwen15_repair_lora
logging_steps: 5
save_steps: 500
save_total_limit: 1
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0001
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
gradient_checkpointing: true
fp16: true
bf16: false
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500

### qlora
quantization_bit: 4
quantization_method: bnb
